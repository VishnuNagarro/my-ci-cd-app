name: Deploy to Elastic Beanstalk

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Zip application
        run: zip -r app.zip .

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Upload to S3
        run: |
          aws s3 cp app.zip s3://elasticbeanstalk-us-east-1-767448074991/app.zip

      - name: Create new application version
        run: |
          aws elasticbeanstalk create-application-version \
          --application-name L2-WebApp \
          --version-label v-${{ github.run_number }} \
          --source-bundle S3Bucket=elasticbeanstalk-us-east-1-767448074991,S3Key=app.zip

      - name: Deploy new version
        run: |
          aws elasticbeanstalk update-environment \
          --environment-name L2-WebApp-Env \
          --version-label v-${{ github.run_number }}
